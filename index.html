<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3d59">
  <link rel="manifest" href="manifest.json">
  <title>نظام اشعارات رحلات العمرة</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1e3d59;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 18px;
      color: #1e3d59;
      background-color: #ffffff;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>مرحباً بك في نظام اشعارات رحلات العمرة</h2>
  <p>اضغط على الزر بالأسفل لفتح النظام</p>
  <a href="https://script.google.com/macros/s/AKfycbxuMCtB1HnxEtZuh5XCLO7eCEIKJ4aF6RupBmGiQRASNn2DhvYyODGlCqSjpIjZzDK_HA/exec" class="btn">دخول التطبيق</a>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
navigator.serviceWorker.register('/umrah-app/sw.js')
        .then(reg => console.log('Service Worker Registered'))
        .catch(err => console.log('Service Worker Failed', err));
      });
    }
  </script>
</body>
</html>
