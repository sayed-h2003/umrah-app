<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3d59">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>نظام اشعارت رحلات العمرة</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #1e3d59; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbz7ygq1DPcHHW0D0RNKL2edlWQpdZCHCEvxd8OcspV06awjfBvWlkBpJhqMZOqrBRuayg/exec"></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Registered'))
          .catch(err => console.log('Service Worker Failed', err));
      });
    }
  </script>
</body>
</html>
